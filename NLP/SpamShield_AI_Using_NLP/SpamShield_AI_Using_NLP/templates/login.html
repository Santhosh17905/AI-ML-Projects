<!-- Login template placeholder -->
{% extends 'base.html' %}

{% block content %}

<h2>Login</h2>

<form method="POST">

<input
class="form-control mb-3"
name="email"
type="email"
placeholder="Email"
required>

<input
class="form-control mb-3"
name="password"
type="password"
placeholder="Password"
required>

<button
class="btn btn-primary">

Login

</button>

</form>

<a href="/register">
Create Account
</a>

{% endblock %}
