{% extends 'base.html' %}

{% block content %}

<h2>Prediction History</h2>

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>Result</th>
<th>Confidence</th>
<th>Date</th>
</tr>

</thead>

<tbody>

{% for row in history %}

<tr>

<td>{{ row.id }}</td>

<td>

{% if row.result == "SPAM" %}

<span class="badge bg-danger">
SPAM
</span>

{% else %}

<span class="badge bg-success">
HAM
</span>

{% endif %}

</td>

<td>{{ row.confidence }}%</td>

<td>{{ row.created_at }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
