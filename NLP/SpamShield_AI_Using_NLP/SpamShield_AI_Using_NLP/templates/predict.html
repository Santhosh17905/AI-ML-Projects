<!-- Prediction template placeholder -->
{% extends 'base.html' %}

{% block content %}

<h2>Spam Detection</h2>

<form method="POST">

<textarea
class="form-control"
name="message"
rows="6"
required>
</textarea>

<br>

<button
class="btn btn-primary">

Analyze Message

</button>

</form>

{% if prediction %}

<hr>

<h3>
Prediction:
{{ prediction }}
</h3>

<h4>
Confidence:
{{ confidence }}%
</h4>

{% endif %}

{% endblock %}
