<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heart Disease Prediction System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

.title{
    text-align:center;
    font-weight:bold;
    margin-bottom:20px;
}

input{
    margin-bottom:10px;
}

.result-card{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card bg-dark text-white p-4">

<h2 class="title">
❤️ Heart Disease Prediction
</h2>

<form action="/predict" method="POST">

<input type="number" class="form-control" name="Age" placeholder="Age" required>

<input type="number" class="form-control" name="Sex" placeholder="Sex (0=Female,1=Male)" required>

<input type="number" class="form-control" name="ChestPainType" placeholder="Chest Pain Type" required>

<input type="number" class="form-control" name="RestingBP" placeholder="Resting BP" required>

<input type="number" class="form-control" name="Cholesterol" placeholder="Cholesterol" required>

<input type="number" class="form-control" name="FastingBS" placeholder="Fasting Blood Sugar" required>

<input type="number" class="form-control" name="RestingECG" placeholder="Resting ECG" required>

<input type="number" class="form-control" name="MaxHR" placeholder="Max Heart Rate" required>

<input type="number" class="form-control" name="ExerciseAngina" placeholder="Exercise Angina" required>

<input type="number" step="0.1" class="form-control" name="Oldpeak" placeholder="Old Peak" required>

<input type="number" class="form-control" name="ST_Slope" placeholder="ST Slope" required>

<button class="btn btn-danger w-100 mt-3">
Predict Risk
</button>

</form>

{% if prediction %}

<div class="result-card bg-{{risk_class}} mt-4">

<h4>{{ prediction }}</h4>

{% if confidence %}
<p>
Confidence:
<b>{{ confidence }}%</b>
</p>
{% endif %}

<p>
Prediction Time:
{{ timestamp }}
</p>

</div>

{% endif %}

{% if error %}

<div class="alert alert-warning mt-3">
{{ error }}
</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>
</html>
